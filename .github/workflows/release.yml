name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package backend
        run: tar -czf open-logic-backend.tar.gz backend
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-logic-backend
          path: open-logic-backend.tar.gz
